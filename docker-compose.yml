# Standalone SmartToolbox stack — clone repo, add .env, then:
#   docker compose up -d
#
# For production multi-service deploy (with CommandDeck, nginx),
# see the pi-deploy repo instead.

services:

  smarttoolbox:
    image: ghcr.io/johnmknight/smartlab-smarttoolbox:latest
    # To build locally instead: comment image line, uncomment build line
    # build: .
    container_name: smarttoolbox
    restart: unless-stopped
    ports:
      - "8091:8091"
    env_file: .env
    volumes:
      - ./data:/app/data
    depends_on:
      - mosquitto

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto:/mosquitto/config
      - mosquitto_data:/mosquitto/data

volumes:
  mosquitto_data:
