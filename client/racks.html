<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMARTTOOLBOX — RACK MANAGER</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');
:root {
  --bg:#080c10;--bg2:#0d1117;--bg3:#111820;
  --border:#1a2535;--border2:#243040;
  --cyan:#00d4ff;--cyan-dim:#00d4ff33;
  --amber:#f59e0b;--green:#00ff80;--red:#ff4444;
  --text:#c8d8e8;--text-dim:#556677;--text-mid:#8899aa;
  --mono:'Space Mono',monospace;--sans:'IBM Plex Sans',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;
  min-height:100vh;display:grid;grid-template-rows:56px 1fr;overflow:hidden;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:1000;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.07) 2px,rgba(0,0,0,.07) 4px);}
/* HEADER */
header{display:flex;align-items:center;gap:16px;padding:0 24px;
  background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
.logo{font-family:var(--mono);font-size:13px;font-weight:700;letter-spacing:.2em;
  color:var(--cyan);text-shadow:0 0 16px var(--cyan);}
.logo span{color:var(--amber);}
.hdr-divider{width:1px;height:24px;background:var(--border2);}
.hdr-title{font-family:var(--mono);font-size:10px;letter-spacing:.15em;color:var(--text-dim);text-transform:uppercase;}
.hdr-back{font-family:var(--mono);font-size:13px;color:var(--text-dim);text-decoration:none;
  padding:4px 8px;border-radius:3px;transition:color .15s,background .15s;margin-right:4px;}
.hdr-back:hover{color:var(--cyan);background:var(--cyan-dim);}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:12px;}
.btn{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  border:none;cursor:pointer;padding:7px 14px;border-radius:3px;transition:all .15s;}
.btn-primary{background:var(--cyan);color:#000;}
.btn-primary:hover{background:#00b8e0;}
.btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--text-mid);}
.btn-ghost:hover{border-color:var(--cyan);color:var(--cyan);}
.btn-danger{background:transparent;border:1px solid #ff444444;color:#ff6666;font-size:9px;padding:4px 8px;}
.btn-danger:hover{background:#ff44441a;border-color:var(--red);}
/* LAYOUT */
.workspace{display:grid;grid-template-columns:320px 1fr;height:calc(100vh - 56px);overflow:hidden;}
/* LEFT PANEL */
.left-panel{background:var(--bg2);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;}
.panel-header{padding:14px 16px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.panel-title{font-family:var(--mono);font-size:9px;letter-spacing:.2em;color:var(--cyan);text-transform:uppercase;}
.rack-list{flex:1;overflow-y:auto;padding:8px;}
.rack-item{padding:10px 12px;border-radius:4px;cursor:pointer;border:1px solid transparent;
  transition:all .15s;margin-bottom:4px;}
.rack-item:hover{background:var(--bg3);border-color:var(--border2);}
.rack-item.active{background:var(--cyan-dim);border-color:var(--cyan);}
.rack-item-id{font-family:var(--mono);font-size:10px;color:var(--cyan);letter-spacing:.1em;}
.rack-item-name{font-size:12px;color:var(--text);margin-top:2px;}
.rack-item-meta{font-size:10px;color:var(--text-dim);margin-top:3px;}
.rack-item-boxes{display:flex;gap:3px;margin-top:6px;flex-wrap:wrap;}
.mini-box{width:12px;height:12px;border-radius:2px;flex-shrink:0;}
/* NEW RACK FORM */
.new-rack-form{padding:14px 16px;border-top:1px solid var(--border);background:var(--bg3);flex-shrink:0;}
.form-title{font-family:var(--mono);font-size:9px;letter-spacing:.2em;color:var(--amber);
  text-transform:uppercase;margin-bottom:10px;}
.field{margin-bottom:8px;}
.field label{display:block;font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;
  color:var(--text-dim);margin-bottom:4px;}
.field input,.field select{width:100%;background:var(--bg);border:1px solid var(--border2);
  color:var(--text);font-family:var(--mono);font-size:11px;padding:6px 8px;border-radius:3px;outline:none;}
.field input:focus,.field select:focus{border-color:var(--cyan);}
.form-row{display:flex;gap:8px;}
.form-row .field{flex:1;}
/* RIGHT PANEL */
.right-panel{display:flex;flex-direction:column;overflow:hidden;background:var(--bg);}
.rack-header{padding:16px 24px;border-bottom:1px solid var(--border);
  display:flex;align-items:flex-start;justify-content:space-between;flex-shrink:0;background:var(--bg2);}
.rack-name-group{display:flex;flex-direction:column;gap:4px;}
.rack-display-name{font-family:var(--mono);font-size:18px;font-weight:700;color:var(--cyan);
  letter-spacing:.05em;}
.rack-id-badge{font-family:var(--mono);font-size:9px;color:var(--text-dim);letter-spacing:.15em;}
.rack-zone-badge{font-size:10px;color:var(--amber);letter-spacing:.05em;}
.rack-actions{display:flex;gap:8px;align-items:center;}
.rack-body{flex:1;overflow-y:auto;padding:24px;display:flex;gap:24px;align-items:flex-start;}
/* RACK VISUAL */
.rack-visual-wrap{flex-shrink:0;}
.rack-visual-label{font-family:var(--mono);font-size:8px;letter-spacing:.2em;color:var(--text-dim);
  text-transform:uppercase;margin-bottom:8px;}
.rack-unit{
  width:220px;
  background:#060a0e;
  border:2px solid var(--border2);
  border-radius:4px;
  position:relative;
  padding:8px 6px;
  /* Rack rail lines */
  box-shadow:inset 6px 0 0 #0d1520,inset -6px 0 0 #0d1520,0 0 20px rgba(0,212,255,.05);
}
.rack-unit::before,.rack-unit::after{
  content:'';position:absolute;top:8px;bottom:8px;width:5px;background:#111c28;
  border-radius:2px;}
.rack-unit::before{left:4px;}
.rack-unit::after{right:4px;}
.rack-slot{
  margin:4px 12px;
  height:44px;
  border-radius:3px;
  display:flex;align-items:center;padding:0 10px;gap:8px;
  position:relative;
  border:1px solid rgba(255,255,255,.06);
  transition:all .2s;
  cursor:default;
}
.rack-slot:hover{border-color:rgba(255,255,255,.15);z-index:1;}
.rack-slot.empty{background:#0a1018;border-style:dashed;border-color:var(--border);cursor:default;}
.slot-indicator{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.slot-name{font-family:var(--mono);font-size:9px;letter-spacing:.08em;color:#fff;flex:1;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.slot-id{font-family:var(--mono);font-size:8px;color:rgba(255,255,255,.4);flex-shrink:0;}
.slot-bat{font-family:var(--mono);font-size:8px;color:rgba(255,255,255,.4);flex-shrink:0;}
.rack-slot.empty .slot-name{color:var(--text-dim);}
.empty-rack-msg{font-family:var(--mono);font-size:9px;color:var(--text-dim);
  text-align:center;padding:20px 0;letter-spacing:.1em;}
.rack-slot-num{position:absolute;left:-18px;font-family:var(--mono);font-size:7px;
  color:var(--text-dim);top:50%;transform:translateY(-50%);}
/* RACK DETAILS */
.rack-details{flex:1;display:flex;flex-direction:column;gap:16px;}
.detail-section{background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:16px;}
.detail-title{font-family:var(--mono);font-size:9px;letter-spacing:.2em;color:var(--amber);
  text-transform:uppercase;margin-bottom:12px;}
.box-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;}
.box-card{background:var(--bg3);border:1px solid var(--border2);border-radius:4px;
  padding:10px 12px;display:flex;flex-direction:column;gap:4px;border-left:3px solid var(--border2);}
.box-card-id{font-family:var(--mono);font-size:9px;color:var(--text-dim);letter-spacing:.1em;}
.box-card-name{font-size:12px;font-weight:600;color:var(--text);}
.box-card-cat{font-size:10px;font-weight:600;letter-spacing:.05em;}
.box-card-meta{font-size:10px;color:var(--text-dim);margin-top:2px;}
.box-card-state{display:flex;align-items:center;gap:5px;margin-top:4px;}
.state-dot{width:6px;height:6px;border-radius:50%;}
.state-label{font-family:var(--mono);font-size:8px;letter-spacing:.08em;text-transform:uppercase;}
/* EDIT PANEL */
.edit-section{background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:16px;}
/* EMPTY STATE */
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;
  color:var(--text-dim);font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;}
.empty-state-icon{font-size:48px;opacity:.3;}
/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:#1a2535;border:1px solid var(--cyan);
  color:var(--cyan);font-family:var(--mono);font-size:10px;letter-spacing:.1em;
  padding:10px 16px;border-radius:4px;z-index:9999;transition:opacity .3s;pointer-events:none;}
.toast.error{border-color:var(--red);color:var(--red);}
/* NEW BOX FORM */
.new-box-form{padding:14px 16px;border-top:1px solid var(--border);background:#0a1018;flex-shrink:0;}
.form-title-box{font-family:var(--mono);font-size:9px;letter-spacing:.2em;color:var(--green);
  text-transform:uppercase;margin-bottom:10px;}
/* ASSIGN PANEL */
.assign-section{background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:16px;}
.assign-row{display:flex;gap:8px;align-items:flex-end;}
.assign-row .field{flex:1;margin:0;}
.unassigned-tag{font-family:var(--mono);font-size:8px;color:var(--text-dim);letter-spacing:.08em;}
</style>
</head>
<body>

<header>
  <a href="/client/index.html" class="hdr-back">&#8592;</a>
  <div class="hdr-divider"></div>
  <span class="logo">SMART<span>TOOLBOX</span></span>
  <div class="hdr-divider"></div>
  <span class="hdr-title">Rack Manager</span>
  <div class="hdr-right">
    <span id="hdr-count" style="font-family:var(--mono);font-size:9px;color:var(--text-dim);letter-spacing:.1em;"></span>
  </div>
</header>

<div class="workspace">
  <!-- LEFT: RACK LIST + NEW RACK FORM -->
  <div class="left-panel">
    <div class="panel-header">
      <span class="panel-title">Racks</span>
      <div style="display:flex;gap:6px;">
        <button class="btn btn-ghost" style="font-size:9px;padding:5px 10px;color:var(--green);border-color:#00ff8044;" onclick="toggleNewBoxForm()">+ BOX</button>
        <button class="btn btn-ghost" style="font-size:9px;padding:5px 10px;" onclick="toggleNewForm()">+ RACK</button>
      </div>
    </div>
    <div class="rack-list" id="rack-list">
      <div style="font-family:var(--mono);font-size:9px;color:var(--text-dim);padding:20px;text-align:center;letter-spacing:.1em;">LOADING…</div>
    </div>
    <!-- NEW RACK FORM -->
    <div class="new-rack-form" id="new-rack-form" style="display:none;">
      <div class="form-title">▸ New Rack</div>
      <div class="form-row">
        <div class="field">
          <label>Rack ID</label>
          <input type="text" id="new-rack-id" placeholder="e.g. RACK-A1" oninput="this.value=this.value.toUpperCase()">
        </div>
      </div>
      <div class="field">
        <label>Display Name</label>
        <input type="text" id="new-rack-name" placeholder="e.g. Workshop Shelf A">
      </div>
      <div class="field">
        <label>Zone</label>
        <input type="text" id="new-rack-zone" placeholder="e.g. WORKSHOP">
      </div>
      <div style="display:flex;gap:8px;margin-top:10px;">
        <button class="btn btn-primary" style="flex:1;" onclick="createRack()">CREATE</button>
        <button class="btn btn-ghost" onclick="toggleNewForm()">CANCEL</button>
      </div>
    </div>

    <!-- NEW BOX FORM -->
    <div class="new-box-form" id="new-box-form" style="display:none;">
      <div class="form-title-box">▸ New Box</div>
      <div class="field">
        <label>Box ID</label>
        <input type="text" id="new-box-id" placeholder="e.g. STB-048" oninput="this.value=this.value.toUpperCase()">
      </div>
      <div class="field">
        <label>Display Name</label>
        <input type="text" id="new-box-name" placeholder="e.g. Socket Set">
      </div>
      <div class="form-row">
        <div class="field">
          <label>Category</label>
          <select id="new-box-cat"></select>
        </div>
        <div class="field">
          <label>Type</label>
          <select id="new-box-type">
            <option value="passive">Passive Box</option>
            <option value="connected">Connected</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label>Assign to Rack <span style="font-size:.55rem;color:#475569;">(optional)</span></label>
        <select id="new-box-rack"><option value="">— unassigned —</option></select>
      </div>
      <div style="display:flex;gap:8px;margin-top:10px;">
        <button class="btn btn-primary" style="flex:1;background:var(--green);color:#000;" onclick="createBox()">CREATE BOX</button>
        <button class="btn btn-ghost" onclick="toggleNewBoxForm()">CANCEL</button>
      </div>
    </div>

  </div><!-- /left-panel -->
  <div class="right-panel" id="right-panel">
    <div class="empty-state" id="empty-state">
      <div class="empty-state-icon">🗄</div>
      <div>Select a rack to view</div>
    </div>
    <!-- RACK DETAIL (hidden until selected) -->
    <div id="rack-detail" style="display:none;flex:1;display:none;flex-direction:column;overflow:hidden;">
      <div class="rack-header">
        <div class="rack-name-group">
          <div class="rack-display-name" id="det-name">—</div>
          <div class="rack-id-badge" id="det-id">—</div>
          <div class="rack-zone-badge" id="det-zone"></div>
        </div>
        <div class="rack-actions">
          <button class="btn btn-ghost" onclick="toggleEditPanel()">EDIT</button>
          <button class="btn btn-danger" onclick="deleteRack()">DELETE</button>
        </div>
      </div>
      <div class="rack-body" id="rack-body">
        <!-- populated by JS -->
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast" style="opacity:0;"></div>

<script>
let racks = [];
let boxes = [];
let categories = {};
let currentRack = null;
let editOpen = false;

// ── CATEGORY COLOR MAP ─────────────────────────────────
async function loadCategories() {
  try {
    const res = await fetch('/api/categories/');
    const cats = await res.json();
    cats.forEach(c => { categories[c.name] = c.color; });
  } catch(e) { /* fallback colors inline */ }
}

function catColor(name) {
  return categories[name] || '#334455';
}

function stateColor(state) {
  if (!state) return '#334455';
  const s = state.toLowerCase();
  if (s === 'connected') return '#00ff80';
  if (s === 'away') return '#f59e0b';
  if (s === 'set_down') return '#00d4ff';
  return '#556677';
}

// ── LOAD DATA ──────────────────────────────────────────
async function load() {
  await loadCategories();
  try {
    const [rRes, bRes] = await Promise.all([
      fetch('/api/racks/'),
      fetch('/api/boxes/')
    ]);
    racks = await rRes.json();
    boxes = await bRes.json();
  } catch(e) {
    toast('API error — is the server running?', true);
    return;
  }
  renderRackList();
  document.getElementById('hdr-count').textContent = racks.length + ' RACK' + (racks.length !== 1 ? 'S' : '');
}

// ── RACK LIST ──────────────────────────────────────────
function renderRackList() {
  const el = document.getElementById('rack-list');
  if (!racks.length) {
    el.innerHTML = '<div style="font-family:var(--mono);font-size:9px;color:var(--text-dim);padding:24px;text-align:center;letter-spacing:.1em;">NO RACKS — CREATE ONE BELOW</div>';
    return;
  }
  el.innerHTML = racks.map(r => {
    const rboxes = boxes.filter(b => b.rack_id === r.rack_id);
    const miniDots = rboxes.slice(0,12).map(b =>
      `<div class="mini-box" style="background:${catColor(b.category)};opacity:.85;" title="${b.display_name || b.box_id}"></div>`
    ).join('');
    return `<div class="rack-item${currentRack?.rack_id === r.rack_id ? ' active':''}"
      onclick="selectRack('${r.rack_id}')">
      <div class="rack-item-id">${r.rack_id}</div>
      <div class="rack-item-name">${r.display_name || r.rack_id}</div>
      <div class="rack-item-meta">${r.zone ? '📍 '+r.zone+' · ' : ''}${rboxes.length} box${rboxes.length !== 1 ? 'es' : ''}</div>
      ${rboxes.length ? `<div class="rack-item-boxes">${miniDots}</div>` : ''}
    </div>`;
  }).join('');
}
</script>

<script>
// ── SELECT RACK ────────────────────────────────────────
function selectRack(rackId) {
  currentRack = racks.find(r => r.rack_id === rackId);
  if (!currentRack) return;
  renderRackList();
  renderRackDetail();
}

function renderRackDetail() {
  const r = currentRack;
  const rboxes = boxes.filter(b => b.rack_id === r.rack_id);

  document.getElementById('empty-state').style.display = 'none';
  const det = document.getElementById('rack-detail');
  det.style.display = 'flex';

  document.getElementById('det-name').textContent = r.display_name || r.rack_id;
  document.getElementById('det-id').textContent = '// ' + r.rack_id;
  document.getElementById('det-zone').textContent = r.zone ? '📍 ' + r.zone : '';

  // Build rack body
  const body = document.getElementById('rack-body');
  body.innerHTML = '';

  // VISUAL RACK
  const wrap = document.createElement('div');
  wrap.className = 'rack-visual-wrap';
  wrap.innerHTML = `<div class="rack-visual-label">// Rack View</div>${buildRackVisual(rboxes)}`;
  body.appendChild(wrap);

  // DETAILS COLUMN
  const details = document.createElement('div');
  details.className = 'rack-details';
  details.innerHTML = buildAssignPanel() + buildBoxCards(rboxes) + buildEditPanel(r);
  body.appendChild(details);
}

// ── RACK VISUAL ────────────────────────────────────────
function buildRackVisual(rboxes) {
  const SLOT_COUNT = Math.max(rboxes.length, 6); // at least 6 slots shown
  let slots = '';
  for (let i = 0; i < SLOT_COUNT; i++) {
    const b = rboxes[i];
    const slotNum = String(SLOT_COUNT - i).padStart(2, '0');
    if (b) {
      const bg = catColor(b.category);
      const sdot = stateColor(b.state);
      const bat = b.battery_pct >= 0 ? Math.round(b.battery_pct) + '%' : '';
      slots += `<div class="rack-slot" style="background:${bg}18;border-color:${bg}44;" title="${b.box_id} — ${b.category}">
        <span class="rack-slot-num">${slotNum}</span>
        <div class="slot-indicator" style="background:${sdot};box-shadow:0 0 6px ${sdot};"></div>
        <span class="slot-name">${b.display_name || b.box_id}</span>
        <span class="slot-id">${b.box_id}</span>
        ${bat ? `<span class="slot-bat">${bat}</span>` : ''}
      </div>`;
    } else {
      slots += `<div class="rack-slot empty">
        <span class="rack-slot-num">${slotNum}</span>
        <span class="slot-name" style="opacity:.3;">— empty —</span>
      </div>`;
    }
  }
  return `<div class="rack-unit">${slots}</div>`;
}

// ── BOX CARDS ──────────────────────────────────────────
function buildBoxCards(rboxes) {
  if (!rboxes.length) {
    return `<div class="detail-section"><div class="detail-title">Boxes in Rack</div>
      <div style="font-family:var(--mono);font-size:9px;color:var(--text-dim);letter-spacing:.1em;">
        NO BOXES ASSIGNED — assign boxes via the box dashboard</div></div>`;
  }
  const cards = rboxes.map(b => {
    const color = catColor(b.category);
    const sdot = stateColor(b.state);
    const slabel = (b.state || 'UNKNOWN').toUpperCase();
    const bat = b.battery_pct >= 0 ? `🔋 ${Math.round(b.battery_pct)}%` : '';
    return `<div class="box-card" style="border-left-color:${color};">
      <div class="box-card-id">${b.box_id}</div>
      <div class="box-card-name">${b.display_name || '—'}</div>
      <div class="box-card-cat" style="color:${color};">${b.category || 'Unassigned'}</div>
      <div class="box-card-meta">${bat}${bat && b.zone ? ' · ' : ''}${b.zone || ''}</div>
      <div class="box-card-state">
        <div class="state-dot" style="background:${sdot};box-shadow:0 0 5px ${sdot};"></div>
        <span class="state-label" style="color:${sdot};">${slabel}</span>
        <button class="btn btn-danger" style="margin-left:auto;" onclick="removeBox('${b.box_id}')">REMOVE</button>
      </div>
    </div>`;
  }).join('');
  return `<div class="detail-section"><div class="detail-title">Boxes in Rack</div>
    <div class="box-grid">${cards}</div></div>`;
}
</script>

<script>
// ── EDIT PANEL ─────────────────────────────────────────
function buildEditPanel(r) {
  return `<div class="edit-section" id="edit-panel" style="display:none;">
    <div class="detail-title">▸ Edit Rack</div>
    <div class="field">
      <label>Display Name</label>
      <input type="text" id="edit-name" value="${r.display_name || ''}" placeholder="Display name">
    </div>
    <div class="field">
      <label>Zone</label>
      <input type="text" id="edit-zone" value="${r.zone || ''}" placeholder="e.g. WORKSHOP">
    </div>
    <div style="display:flex;gap:8px;margin-top:10px;">
      <button class="btn btn-primary" style="flex:1;" onclick="saveRack()">SAVE</button>
      <button class="btn btn-ghost" onclick="toggleEditPanel()">CANCEL</button>
    </div>
  </div>`;
}

function toggleEditPanel() {
  editOpen = !editOpen;
  const el = document.getElementById('edit-panel');
  if (el) el.style.display = editOpen ? 'block' : 'none';
}

async function saveRack() {
  if (!currentRack) return;
  const name = document.getElementById('edit-name').value.trim();
  const zone = document.getElementById('edit-zone').value.trim();
  const res = await fetch(`/api/racks/${currentRack.rack_id}`, {
    method: 'PATCH',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({display_name: name, zone: zone})
  });
  if (res.ok) {
    currentRack.display_name = name;
    currentRack.zone = zone;
    const r = racks.find(r => r.rack_id === currentRack.rack_id);
    if (r) { r.display_name = name; r.zone = zone; }
    editOpen = false;
    renderRackList();
    renderRackDetail();
    toast('Rack updated');
  } else {
    toast('Save failed', true);
  }
}

// ── CREATE RACK ────────────────────────────────────────
function toggleNewForm() {
  const f = document.getElementById('new-rack-form');
  const isOpen = f.style.display !== 'none';
  document.getElementById('new-box-form').style.display = 'none';
  f.style.display = isOpen ? 'none' : 'block';
}

async function createRack() {
  const id = document.getElementById('new-rack-id').value.trim().toUpperCase();
  const name = document.getElementById('new-rack-name').value.trim();
  const zone = document.getElementById('new-rack-zone').value.trim();
  if (!id) { toast('Rack ID required', true); return; }
  const res = await fetch('/api/racks/', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({rack_id: id, display_name: name || id, zone})
  });
  if (res.ok) {
    document.getElementById('new-rack-id').value = '';
    document.getElementById('new-rack-name').value = '';
    document.getElementById('new-rack-zone').value = '';
    toggleNewForm();
    await load();
    selectRack(id);
    toast('Rack created: ' + id);
  } else {
    const err = await res.json();
    toast(err.detail || 'Create failed', true);
  }
}

// ── DELETE RACK ────────────────────────────────────────
async function deleteRack() {
  if (!currentRack) return;
  if (!confirm(`Delete rack ${currentRack.rack_id}? Boxes will remain but lose their rack assignment.`)) return;
  const res = await fetch(`/api/racks/${currentRack.rack_id}`, {method: 'DELETE'});
  if (res.ok) {
    toast('Rack deleted');
    currentRack = null;
    await load();
    document.getElementById('rack-detail').style.display = 'none';
    document.getElementById('empty-state').style.display = 'flex';
  } else {
    toast('Delete failed', true);
  }
}

// ── CREATE BOX ────────────────────────────────────────
function toggleNewBoxForm() {
  const f = document.getElementById('new-box-form');
  const isOpen = f.style.display !== 'none';
  // close rack form if open
  document.getElementById('new-rack-form').style.display = 'none';
  f.style.display = isOpen ? 'none' : 'block';
  if (!isOpen) populateNewBoxForm();
}

function populateNewBoxForm() {
  // Fill category dropdown from loaded categories
  const sel = document.getElementById('new-box-cat');
  sel.innerHTML = Object.keys(categories).length
    ? Object.keys(categories).map(n => `<option value="${n}">${n}</option>`).join('')
    : '<option value="Unassigned">Unassigned</option>';
  // Fill rack dropdown
  const rsel = document.getElementById('new-box-rack');
  rsel.innerHTML = '<option value="">— unassigned —</option>' +
    racks.map(r => `<option value="${r.rack_id}"${currentRack?.rack_id === r.rack_id ? ' selected' : ''}>${r.rack_id} — ${r.display_name}</option>`).join('');
}

async function createBox() {
  const id   = document.getElementById('new-box-id').value.trim().toUpperCase();
  const name = document.getElementById('new-box-name').value.trim();
  const cat  = document.getElementById('new-box-cat').value;
  const type = document.getElementById('new-box-type').value;
  const rack = document.getElementById('new-box-rack').value;
  if (!id) { toast('Box ID required', true); return; }
  const res = await fetch('/api/boxes/', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      box_id: id,
      display_name: name || id,
      category: cat,
      state: type,
      rack_id: rack || null
    })
  });
  if (res.ok) {
    // Clear form
    document.getElementById('new-box-id').value = '';
    document.getElementById('new-box-name').value = '';
    document.getElementById('new-box-form').style.display = 'none';
    // Reload everything and re-select current rack (or the assigned one)
    await load();
    const targetRack = rack || currentRack?.rack_id;
    if (targetRack) selectRack(targetRack);
    toast(`Box ${id} created`);
  } else {
    const err = await res.json().catch(() => ({}));
    toast(err.detail || 'Create failed', true);
  }
}

// ── ASSIGN PANEL ───────────────────────────────────────
function buildAssignPanel() {
  // All boxes not in this rack, grouped: unassigned first, then other racks
  const unassigned = boxes.filter(b => !b.rack_id || b.rack_id === '');
  const elsewhere  = boxes.filter(b => b.rack_id && b.rack_id !== currentRack.rack_id);
  const available  = [...unassigned, ...elsewhere];

  const opts = available.length
    ? available.map(b => {
        const loc = b.rack_id ? `[${b.rack_id}]` : '[unassigned]';
        return `<option value="${b.box_id}">${b.box_id} — ${b.display_name || '?'} ${loc}</option>`;
      }).join('')
    : `<option value="" disabled>All boxes are in this rack</option>`;

  return `<div class="assign-section">
    <div class="detail-title">▸ Assign Box to Rack</div>
    <div class="assign-row">
      <div class="field">
        <label>Box</label>
        <select id="assign-select">${opts}</select>
      </div>
      <button class="btn btn-primary" onclick="assignBox()">ASSIGN</button>
    </div>
  </div>`;
}

async function assignBox() {
  const sel = document.getElementById('assign-select');
  if (!sel || !sel.value) return;
  const boxId = sel.value;
  const res = await fetch(`/api/boxes/${boxId}`, {
    method: 'PATCH',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({rack_id: currentRack.rack_id})
  });
  if (res.ok) {
    // Update local state
    const b = boxes.find(b => b.box_id === boxId);
    if (b) b.rack_id = currentRack.rack_id;
    renderRackList();
    renderRackDetail();
    toast(`${boxId} → ${currentRack.rack_id}`);
  } else {
    toast('Assign failed', true);
  }
}

async function removeBox(boxId) {
  const res = await fetch(`/api/boxes/${boxId}`, {
    method: 'PATCH',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({rack_id: '__NONE__'})
  });
  if (res.ok) {
    const b = boxes.find(b => b.box_id === boxId);
    if (b) b.rack_id = null;
    renderRackList();
    renderRackDetail();
    toast(`${boxId} removed from rack`);
  } else {
    toast('Remove failed', true);
  }
}

// ── TOAST ──────────────────────────────────────────────
function toast(msg, isError) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast' + (isError ? ' error' : '');
  el.style.opacity = '1';
  setTimeout(() => { el.style.opacity = '0'; }, 2800);
}

// INIT
document.addEventListener('DOMContentLoaded', load);
</script>
</body>
</html>
